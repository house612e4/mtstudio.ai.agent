<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#050B14">
<title>MtStudio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=Google+Sans:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050B14;--surface:#0A0F1C;--surface-2:#111827;--surface-3:#1a2332;
  --border:rgba(255,255,255,0.06);--border-2:rgba(255,255,255,0.1);
  --cyan:#22d3ee;--cyan-deep:#0891b2;--violet:#7c3aed;--violet-bright:#8b5cf6;
  --pink:#ec4899;--green:#10b981;--blue:#3b82f6;--yellow:#f59e0b;
  --text:#e2e8f0;--text-2:#94a3b8;--text-3:#5b6478;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans Bengali','Google Sans','Inter',sans-serif;display:flex;flex-direction:column;height:100dvh;}

/* ===== Drawer (Gemini-style: minimal, flat list) ===== */
#drawerOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:40;}
#drawerOverlay.open{display:block;}
#drawer{position:fixed;left:-300px;top:0;bottom:0;width:280px;background:var(--bg);z-index:50;display:flex;flex-direction:column;transition:left 0.25s cubic-bezier(0.4,0,0.2,1);padding-bottom:env(safe-area-inset-bottom);}
#drawer.open{left:0;}
.drawer-top{padding:20px 20px 8px;display:flex;align-items:center;gap:10px;}
.drawer-top .brandmark{width:26px;height:26px;background:linear-gradient(135deg,var(--cyan),var(--violet-bright) 50%,var(--blue));clip-path:polygon(50% 0%,54% 46%,100% 50%,54% 54%,50% 100%,46% 54%,0% 50%,46% 46%);}
.drawer-top .brandtext{font-size:21px;font-weight:500;letter-spacing:-0.3px;}
.new-chat-pill{display:flex;align-items:center;gap:12px;margin:12px 16px 4px;padding:13px 18px;border-radius:24px;background:var(--surface-2);border:none;color:var(--text);font-size:14.5px;font-weight:500;cursor:pointer;width:calc(100% - 32px);font-family:inherit;}
.new-chat-pill svg{width:18px;height:18px;color:var(--text-2);}
.drawer-nav-item{display:flex;align-items:center;gap:18px;padding:13px 20px;border:none;background:transparent;color:var(--text);cursor:pointer;width:100%;text-align:left;font-size:15px;font-family:inherit;}
.drawer-nav-item svg{width:21px;height:21px;color:var(--text-2);flex-shrink:0;}
.drawer-sep{height:1px;background:var(--border);margin:8px 0;}
.drawer-recent-label{font-size:13px;font-weight:500;color:var(--text-2);padding:14px 20px 6px;}
.drawer-recent-item{display:block;padding:11px 20px;color:var(--text-2);font-size:14.5px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:inherit;background:none;border:none;width:100%;text-align:left;}
.drawer-recent-item:active{background:var(--surface-2);}
.drawer-spacer{flex:1;}
.drawer-bottom-item{display:flex;align-items:center;gap:18px;padding:14px 20px calc(14px + env(safe-area-inset-bottom));border:none;background:transparent;color:var(--text);cursor:pointer;width:100%;text-align:left;font-size:15px;font-family:inherit;border-top:1px solid var(--border);}
.drawer-bottom-item svg{width:21px;height:21px;color:var(--text-2);}

/* ===== Settings Panel ===== */
#settingsPanel{position:fixed;inset:0;background:var(--bg);z-index:60;display:none;flex-direction:column;padding-bottom:env(safe-area-inset-bottom);}
#settingsPanel.open{display:flex;}
.panel-header{display:flex;align-items:center;gap:18px;padding:18px 16px;flex-shrink:0;}
.icon-btn{width:40px;height:40px;border-radius:50%;border:none;background:transparent;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.icon-btn svg{width:22px;height:22px;}
.panel-title{font-size:20px;font-weight:500;}
.panel-body{flex:1;overflow-y:auto;padding:8px 0;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;}
.setting-row-left{display:flex;align-items:center;gap:18px;}
.setting-row-left svg{width:22px;height:22px;color:var(--text-2);flex-shrink:0;}
.setting-row-text .t1{font-size:15.5px;}
.setting-row-text .t2{font-size:12.5px;color:var(--text-2);margin-top:2px;}
.toggle{width:42px;height:24px;border-radius:12px;background:var(--cyan-deep);position:relative;cursor:pointer;border:none;flex-shrink:0;}
.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:21px;transition:left 0.2s;}
.toggle.off{background:var(--surface-3);}
.toggle.off::after{left:3px;}
.settings-divider{height:1px;background:var(--border);margin:8px 20px;}

/* ===== Topbar (Gemini-style) ===== */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 8px;flex-shrink:0;position:relative;z-index:30;}
.model-trigger{display:flex;align-items:center;gap:4px;background:transparent;border:none;cursor:pointer;color:var(--text);font-size:21px;font-weight:500;font-family:'Google Sans','Inter',sans-serif;padding:8px 10px;border-radius:10px;letter-spacing:-0.2px;}
.model-trigger .v-name{color:var(--text-2);font-weight:400;font-size:18px;}
.model-trigger svg{width:18px;height:18px;color:var(--text-2);margin-left:2px;transition:transform 0.2s;}
.model-trigger.open svg{transform:rotate(180deg);}
.avatar-btn{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--cyan-deep),var(--violet));display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;flex-shrink:0;margin-right:8px;}

.model-dropdown{position:absolute;top:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--border-2);border-radius:18px;padding:8px;min-width:260px;box-shadow:0 8px 32px rgba(0,0,0,0.6);display:none;z-index:100;}
.model-dropdown.open{display:block;}
.mg-label{font-size:11px;font-weight:600;color:var(--text-3);padding:8px 12px 4px;letter-spacing:0.6px;text-transform:uppercase;}
.mo{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;cursor:pointer;width:100%;border:none;background:transparent;text-align:left;color:var(--text);}
.mo:active{background:var(--surface-3);}
.mo.selected{background:rgba(34,211,238,0.1);}
.mo .chk{width:17px;height:17px;margin-left:auto;color:var(--cyan);opacity:0;flex-shrink:0;}
.mo.selected .chk{opacity:1;}
.mo-icon{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.ic-ar{background:linear-gradient(135deg,var(--cyan-deep),var(--violet));color:#fff;}
.ic-cl{background:rgba(124,58,237,0.18);color:var(--violet-bright);}
.ic-gp{background:rgba(16,185,129,0.15);color:var(--green);}
.ic-gm{background:rgba(59,130,246,0.15);color:var(--blue);}
.dd-div{height:1px;background:var(--border);margin:6px 4px;}
.mo-info .mn{font-size:14.5px;font-weight:500;}
.mo-info .md{font-size:11.5px;color:var(--text-3);margin-top:1px;}

/* ===== Chat / Welcome (Gemini-style) ===== */
#chat{flex:1;overflow-y:auto;padding:0 0 12px;scroll-behavior:smooth;}
#chat::-webkit-scrollbar{width:0;}
#welcome{display:flex;flex-direction:column;justify-content:center;min-height:80%;padding:28px 24px;gap:14px;}
.w-greeting{font-size:34px;font-weight:500;line-height:1.25;letter-spacing:-0.5px;
  background:linear-gradient(100deg,var(--cyan) 0%,var(--violet-bright) 38%,var(--blue) 68%,var(--cyan) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.w-sub{font-size:22px;font-weight:400;color:var(--text-2);line-height:1.3;}
.suggest-row{display:flex;gap:10px;overflow-x:auto;padding:24px 0 4px;margin:0 -24px;padding-left:24px;padding-right:24px;-webkit-overflow-scrolling:touch;}
.suggest-row::-webkit-scrollbar{display:none;}
.suggest-chip{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:11px 16px;border-radius:20px;border:1px solid var(--border-2);background:var(--surface);color:var(--text);font-size:13.5px;white-space:nowrap;cursor:pointer;font-family:inherit;}
.suggest-chip .si{font-size:16px;}

.msg-group{padding:6px 16px;}
.msg-group.user{display:flex;justify-content:flex-end;}
.msg-group.ai{display:flex;justify-content:flex-start;gap:0;padding-left:8px;}
.msg-content{display:flex;flex-direction:column;gap:4px;max-width:88%;}
.msg-meta{font-size:11px;color:var(--text-3);padding:2px 4px 0;}
.bubble{padding:13px 17px;border-radius:22px;font-size:15.5px;line-height:1.65;word-break:break-word;}
.msg-group.user .bubble{background:var(--surface-2);border-bottom-right-radius:6px;white-space:pre-wrap;}
.msg-group.ai .bubble{background:transparent;padding:8px 8px;}
.bubble h1,.bubble h2,.bubble h3{font-weight:600;margin:12px 0 6px;line-height:1.3;}
.bubble h1{font-size:18px;}.bubble h2{font-size:16.5px;}.bubble h3{font-size:15.5px;color:var(--violet-bright);}
.bubble p{margin:6px 0;}.bubble strong{font-weight:700;color:#f1f5f9;}.bubble em{font-style:italic;color:var(--text-2);}
.bubble ul,.bubble ol{padding-left:22px;margin:6px 0;}.bubble li{margin:4px 0;line-height:1.6;}
.bubble code{background:rgba(34,211,238,0.08);border-radius:5px;padding:1px 7px;font-size:13px;font-family:monospace;color:var(--cyan);}
.bubble pre{background:rgba(0,0,0,0.5);border-radius:12px;padding:14px;margin:8px 0;overflow-x:auto;}
.bubble pre code{background:none;padding:0;font-size:12.5px;}
.bubble hr{border:none;border-top:1px solid var(--border);margin:10px 0;}
.bubble blockquote{border-left:3px solid var(--violet-bright);padding-left:12px;margin:6px 0;color:var(--text-2);}
.bubble a{color:var(--cyan);}
.typing-wrap{display:flex;gap:5px;padding:14px 8px;}
.typing-wrap span{width:7px;height:7px;border-radius:50%;animation:tbounce 1.1s infinite ease-in-out;background:var(--cyan);}
.typing-wrap span:nth-child(2){animation-delay:0.15s;background:var(--violet-bright);}
.typing-wrap span:nth-child(3){animation-delay:0.3s;background:var(--blue);}
@keyframes tbounce{0%,80%,100%{transform:translateY(0);opacity:0.4;}40%{transform:translateY(-6px);opacity:1;}}

/* ===== Input bar (Gemini-style pill) ===== */
#input-area{flex-shrink:0;padding:10px 12px calc(14px + env(safe-area-inset-bottom));}
.input-box{background:var(--surface-2);border-radius:30px;padding:8px 8px 8px 20px;display:flex;align-items:flex-end;gap:6px;}
#input{flex:1;resize:none;max-height:120px;min-height:26px;background:transparent;border:none;outline:none;color:var(--text);font-size:16px;line-height:1.5;font-family:'Noto Sans Bengali','Inter',sans-serif;padding:6px 0;}
#input::placeholder{color:var(--text-3);}
.input-icon-btn{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;background:transparent;color:var(--text-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.input-icon-btn svg{width:21px;height:21px;}
.send-btn{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--cyan-deep),var(--violet));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn:disabled{opacity:0.3;}
.send-btn svg{width:18px;height:18px;}
.input-hint{text-align:center;font-size:11px;color:var(--text-3);margin-top:8px;}

#ddOverlay{display:none;position:fixed;inset:0;z-index:20;}
#ddOverlay.open{display:block;}

/* ===== Image/Video Generator ===== */
#imageGenPanel{position:fixed;inset:0;background:var(--bg);z-index:60;display:none;flex-direction:column;padding-bottom:env(safe-area-inset-bottom);}
#imageGenPanel.open{display:flex;}
.ig-tabs{display:flex;gap:8px;padding:8px 16px 16px;}
.ig-tab{flex:1;padding:11px;border-radius:24px;border:none;background:var(--surface-2);color:var(--text-2);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
.ig-tab.active{background:linear-gradient(135deg,var(--cyan-deep),var(--violet));color:#fff;}
.ig-textarea{width:100%;background:var(--surface-2);border:none;border-radius:18px;padding:16px;color:var(--text);font-size:15px;font-family:'Noto Sans Bengali','Inter',sans-serif;resize:vertical;outline:none;margin-bottom:14px;}
.ig-options{margin-bottom:14px;}
.ig-select{width:100%;background:var(--surface-2);border:none;border-radius:14px;padding:13px 16px;color:var(--text);font-size:14.5px;font-family:inherit;outline:none;}
.ig-generate-btn{width:100%;padding:15px;border-radius:18px;border:none;background:linear-gradient(135deg,var(--cyan-deep),var(--violet));color:#fff;font-size:15.5px;font-weight:600;cursor:pointer;font-family:inherit;}
.ig-generate-btn:disabled{opacity:0.5;}
#igResult{margin-top:16px;}
#igResult img,#igResult video{width:100%;border-radius:18px;}
.ig-status{text-align:center;color:var(--text-2);font-size:13.5px;padding:24px;}
.ig-error{color:#f87171;font-size:13.5px;text-align:center;padding:14px;background:rgba(248,113,113,0.08);border-radius:14px;}
</style>
</head>
<body>
<div id="drawerOverlay" onclick="closeDrawer()"></div>
<div id="drawer">
  <div class="drawer-top">
    <div class="brandmark"></div>
    <span class="brandtext">MtStudio</span>
  </div>
  <button class="new-chat-pill" onclick="newChat();closeDrawer()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    নতুন চ্যাট
  </button>
  <button class="drawer-nav-item" onclick="alert('শীঘ্রই আসছে')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    চ্যাট খুঁজুন
  </button>
  <button class="drawer-nav-item" onclick="openImageGen();closeDrawer()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    আরমান জেনারেটর
  </button>
  <div class="drawer-sep"></div>
  <div class="drawer-recent-label">সাম্প্রতিক</div>
  <div id="chatHistory"></div>
  <div class="drawer-spacer"></div>
  <button class="drawer-bottom-item" onclick="openSettings()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    সেটিংস
  </button>
</div>

<div id="settingsPanel">
  <div class="panel-header">
    <button class="icon-btn" onclick="closeSettings()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
    <span class="panel-title">সেটিংস</span>
  </div>
  <div class="panel-body">
    <div class="setting-row" onclick="toggleMemory()">
      <div class="setting-row-left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <div class="setting-row-text"><div class="t1">মেমোরি</div><div class="t2">আগের কথা মনে রাখবে</div></div>
      </div>
      <button class="toggle" id="memoryToggle"></button>
    </div>
    <div class="settings-divider"></div>
    <div class="setting-row" onclick="clearAllHistory()">
      <div class="setting-row-left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
        <div class="setting-row-text"><div class="t1">চ্যাট ইতিহাস মুছুন</div></div>
      </div>
    </div>
    <div class="settings-divider"></div>
    <div class="setting-row">
      <div class="setting-row-left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>
        <div class="setting-row-text"><div class="t1">Mahsin</div><div class="t2">MtStudio AI — Owner</div></div>
      </div>
    </div>
  </div>
</div>

<div id="imageGenPanel">
  <div class="panel-header">
    <button class="icon-btn" onclick="closeImageGen()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
    <span class="panel-title">আরমান জেনারেটর</span>
  </div>
  <div class="ig-tabs">
    <button class="ig-tab active" id="igTabImage" onclick="switchGenMode('image')">ছবি</button>
    <button class="ig-tab" id="igTabVideo" onclick="switchGenMode('video')">ভিডিও</button>
  </div>
  <div class="panel-body" style="padding:0 16px;">
    <textarea id="igPrompt" class="ig-textarea" rows="3" placeholder="যা তৈরি করতে চান লিখুন..."></textarea>
    <div class="ig-options" id="igOptionsImage">
      <select id="igAspect" class="ig-select">
        <option value="1:1">বর্গাকার (1:1)</option>
        <option value="16:9">ওয়াইডস্ক্রিন (16:9)</option>
        <option value="9:16" selected>স্টোরি/রিলস (9:16)</option>
        <option value="4:3">প্রেজেন্টেশন (4:3)</option>
      </select>
    </div>
    <div class="ig-options" id="igOptionsVideo" style="display:none;">
      <select id="igDuration" class="ig-select">
        <option value="5">৫ সেকেন্ড</option>
        <option value="10">১০ সেকেন্ড</option>
      </select>
    </div>
    <button class="ig-generate-btn" id="igGenBtn" onclick="generateMedia()">তৈরি করুন</button>
    <div id="igResult"></div>
  </div>
</div>

<div id="main">
  <div id="topbar">
    <button class="icon-btn" onclick="openDrawer()" style="margin-left:4px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div id="model-selector" style="position:relative;">
      <button class="model-trigger" id="modelTrigger" onclick="toggleDD()"><span id="brandName">আরমান</span><span class="v-name" id="versionName">Pro</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg></button>
      <div class="model-dropdown" id="modelDropdown">
        <div class="mg-label">MtStudio AI</div>
        <button class="mo selected" onclick="sel('arman','Pro','আরমান','grok-4.3','p-ar',this)"><span class="mo-icon ic-ar">✦</span><div class="mo-info"><div class="mn">আরমান Pro</div><div class="md">সর্বোচ্চ নির্ভুলতা</div></div><svg class="chk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></button>
        <button class="mo" onclick="sel('arman','Flash','আরমান','grok-build-0.1','p-ar',this)"><span class="mo-icon ic-ar">✦</span><div class="mo-info"><div class="mn">আরমান Flash</div><div class="md">দ্রুততম উত্তর</div></div><svg class="chk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></button>
        <div class="dd-div"></div>
        <div class="mg-label">Anthropic Claude</div>
        <button class="mo" onclick="sel('claude','Sonnet 4.6','Claude','claude-sonnet-4-6','p-cl',this)"><span class="mo-icon ic-cl">◆</span><div class="mo-info"><div class="mn">Claude Sonnet 4.6</div><div class="md">Balanced</div></div><svg class="chk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></button>
        <button class="mo" onclick="sel('claude','Opus 4.7','Claude','claude-opus-4-7','p-cl',this)"><span class="mo-icon ic-cl">◆</span><div class="mo-info"><div class="mn">Claude Opus 4.7</div><div class="md">Most powerful</div></div><svg class="chk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></button>
        <div class="dd-div"></div>
        <div class="mg-label">OpenAI GPT</div>
        <button class="mo" onclick="sel('gpt','4o','GPT','gpt-4o','p-gp',this)"><span class="mo-icon ic-gp">●</span><div class="mo-info"><div class="mn">GPT-4o</div><div class="md">Advanced reasoning</div></div><svg class="chk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></button>
        <div class="dd-div"></div>
        <div class="mg-label">Google Gemini</div>
        <button class="mo" onclick="sel('gemini','2.0 Flash','Gemini','gemini-2.0-flash','p-gm',this)"><span class="mo-icon ic-gm">✧</span><div class="mo-info"><div class="mn">Gemini 2.0 Flash</div><div class="md">All-around help</div></div><svg class="chk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></button>
      </div>
    </div>
    <div style="flex:1;"></div>
    <button class="avatar-btn" onclick="openSettings()">M</button>
  </div>
  <div id="chat"><div id="welcome"></div></div>
  <div id="input-area">
    <div class="input-box">
      <textarea id="input" rows="1" placeholder="আরমানকে জিজ্ঞেস করুন"></textarea>
      <button class="input-icon-btn" onclick="openImageGen()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      <button class="send-btn" id="send" onclick="send()"><svg viewBox="0 0 24 24" fill="none" stroke="#050B14" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="6 11 12 5 18 11"/></svg></button>
    </div>
    <div class="input-hint">আরমান ভুল করতে পারে — গুরুত্বপূর্ণ তথ্য যাচাই করুন</div>
  </div>
</div>
<div id="ddOverlay" onclick="closeDD()"></div>
<script>
const WORKER_URL="https://mt-ai.studiomt46.workers.dev/";
const MT_KEY="mtai2026";
const safeStorage = {
  get(key, fallback){ try{ return localStorage.getItem(key) ?? fallback; }catch(e){ return fallback; } },
  set(key, value){ try{ localStorage.setItem(key, value); }catch(e){} },
  remove(key){ try{ localStorage.removeItem(key); }catch(e){} }
};
let cType='arman',cVersion='Pro',cBrand='আরমান',cModelId='grok-4.3',cPill='p-ar';
let sessionHistory=[];
let chatHistories=JSON.parse(safeStorage.get('mtstudio_histories','[]'));
let memoryOn=true;
const chatEl=document.getElementById('chat');
const inputEl=document.getElementById('input');
const sendBtn=document.getElementById('send');
renderWelcome();
renderHistory();
document.getElementById('memoryToggle').classList.toggle('off',!memoryOn);
function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawerOverlay').classList.add('open');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawerOverlay').classList.remove('open');}
function openSettings(){closeDrawer();document.getElementById('settingsPanel').classList.add('open');}
function closeSettings(){document.getElementById('settingsPanel').classList.remove('open');}
function toggleDD(){document.getElementById('modelDropdown').classList.toggle('open');document.getElementById('modelTrigger').classList.toggle('open');document.getElementById('ddOverlay').classList.toggle('open');}
function closeDD(){document.getElementById('modelDropdown').classList.remove('open');document.getElementById('modelTrigger').classList.remove('open');document.getElementById('ddOverlay').classList.remove('open');}
function toggleMemory(){memoryOn=!memoryOn;document.getElementById('memoryToggle').classList.toggle('off',!memoryOn);}
function sel(type,ver,brand,id,pill,btn){cType=type;cVersion=ver;cBrand=brand;cModelId=id;cPill=pill;document.getElementById('brandName').textContent=brand;document.getElementById('versionName').textContent=ver;document.querySelectorAll('.mo').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');closeDD();}
function getPill(p){return p==='p-ar'?'আরমান':p==='p-cl'?'Claude':p==='p-gp'?'GPT':'Gemini';}
function md(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/```([\s\S]*?)```/g,(_,c)=>`<pre><code>${c.trim()}</code></pre>`).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>').replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/^---$/gm,'<hr>').replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>').replace(/^\- (.+)$/gm,'<li>$1</li>').replace(/^\d+\. (.+)$/gm,'<li>$1</li>').replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>').replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>').replace(/\n\n+/g,'</p><p>').replace(/\n/g,'<br>');}
function timeNow(){return new Date().toLocaleTimeString('bn-BD',{hour:'2-digit',minute:'2-digit'});}
function renderWelcome(){document.getElementById('welcome').innerHTML=`<div class="w-greeting">হ্যালো, মাহসিন</div><div class="w-sub">আজকে কী নিয়ে কাজ করব?</div><div class="suggest-row"><button class="suggest-chip" onclick="quickSend(this)"><span class="si">📊</span>মার্কেটিং স্ট্র্যাটেজি</button><button class="suggest-chip" onclick="quickSend(this)"><span class="si">✍️</span>TikTok script</button><button class="suggest-chip" onclick="quickSend(this)"><span class="si">🚀</span>Growth plan</button><button class="suggest-chip" onclick="quickSend(this)"><span class="si">🤖</span>AI prompt বানাও</button></div>`;}
function removeWelcome(){const w=document.getElementById('welcome');if(w)w.remove();}
function addMsg(role,text,pill='p-ar'){removeWelcome();const w=document.createElement('div');w.className=`msg-group ${role}`;if(role==='ai'){w.innerHTML=`<div class="msg-content"><div class="msg-meta">${getPill(pill)} · ${timeNow()}</div><div class="bubble">${md(text)}</div></div>`;}else{w.innerHTML=`<div class="msg-content"><div class="bubble">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>`;}chatEl.appendChild(w);chatEl.scrollTop=chatEl.scrollHeight;}
function showTyping(){const w=document.createElement('div');w.className='msg-group ai';w.id='typing';w.innerHTML=`<div class="msg-content"><div class="bubble"><div class="typing-wrap"><span></span><span></span><span></span></div></div></div>`;chatEl.appendChild(w);chatEl.scrollTop=chatEl.scrollHeight;}
function hideTyping(){const e=document.getElementById('typing');if(e)e.remove();}
function newChat(){if(sessionHistory.length>0){const first=sessionHistory[0]?.content?.slice(0,40)||'নতুন চ্যাট';chatHistories.unshift({id:Date.now(),title:first});if(chatHistories.length>15)chatHistories.pop();safeStorage.set('mtstudio_histories',JSON.stringify(chatHistories));renderHistory();}sessionHistory=[];chatEl.innerHTML='<div id="welcome"></div>';renderWelcome();}
function renderHistory(){const el=document.getElementById('chatHistory');el.innerHTML=chatHistories.slice(0,10).map(h=>`<button class="drawer-recent-item">${h.title}</button>`).join('');}
function clearAllHistory(){if(confirm('সব চ্যাট ইতিহাস মুছে যাবে?')){chatHistories=[];safeStorage.remove('mtstudio_histories');renderHistory();newChat();closeSettings();}}
function quickSend(btn){const txt=btn.querySelector('.si')?btn.textContent.replace(btn.querySelector('.si').textContent,'').trim():btn.textContent.trim();inputEl.value=txt;send();}
async function send(){const text=inputEl.value.trim();if(!text)return;addMsg('user',text);inputEl.value='';inputEl.style.height='auto';sendBtn.disabled=true;showTyping();sessionHistory.push({role:'user',content:text});const pill=cPill;try{const res=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json','X-MT-Key':MT_KEY},body:JSON.stringify({message:text,model:cModelId,modelType:cType,history:sessionHistory.slice(-20),conversationId:'mahsin-main'})});const data=await res.json();hideTyping();if(!res.ok){addMsg('ai','সমস্যা: '+(data.error||'ত্রুটি'),pill);}else{addMsg('ai',data.reply||'...',pill);sessionHistory.push({role:'assistant',content:data.reply});if(sessionHistory.length>40)sessionHistory=sessionHistory.slice(-40);}}catch(e){hideTyping();addMsg('ai','সংযোগে সমস্যা হয়েছে।',pill);}finally{sendBtn.disabled=false;inputEl.focus();}}
inputEl.addEventListener('input',()=>{inputEl.style.height='auto';inputEl.style.height=Math.min(inputEl.scrollHeight,120)+'px';});
inputEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});

let genMode='image';
function openImageGen(){document.getElementById('imageGenPanel').classList.add('open');}
function closeImageGen(){document.getElementById('imageGenPanel').classList.remove('open');}
function switchGenMode(mode){genMode=mode;document.getElementById('igTabImage').classList.toggle('active',mode==='image');document.getElementById('igTabVideo').classList.toggle('active',mode==='video');document.getElementById('igOptionsImage').style.display=mode==='image'?'block':'none';document.getElementById('igOptionsVideo').style.display=mode==='video'?'block':'none';document.getElementById('igResult').innerHTML='';}
async function generateMedia(){
  const prompt=document.getElementById('igPrompt').value.trim();
  if(!prompt){alert('কিছু লিখুন প্রথমে');return;}
  const btn=document.getElementById('igGenBtn');
  const resultEl=document.getElementById('igResult');
  btn.disabled=true;btn.textContent='তৈরি হচ্ছে...';
  resultEl.innerHTML='<div class="ig-status">আরমান কাজ করছে...</div>';
  try{
    if(genMode==='image'){
      const aspect=document.getElementById('igAspect').value;
      const res=await fetch(WORKER_URL.replace(/\/$/,'')+'/image-gen',{method:'POST',headers:{'Content-Type':'application/json','X-MT-Key':MT_KEY},body:JSON.stringify({prompt,aspect_ratio:aspect})});
      const data=await res.json();
      if(!res.ok||!data.images){throw new Error(data.error||'ছবি তৈরি ব্যর্থ হয়েছে');}
      resultEl.innerHTML=data.images.map(u=>`<img src="${u}" alt="generated">`).join('');
    }else{
      const duration=parseInt(document.getElementById('igDuration').value);
      const res=await fetch(WORKER_URL.replace(/\/$/,'')+'/video-gen',{method:'POST',headers:{'Content-Type':'application/json','X-MT-Key':MT_KEY},body:JSON.stringify({prompt,duration})});
      const data=await res.json();
      if(res.status===202){resultEl.innerHTML='<div class="ig-status">ভিডিও তৈরি হতে বেশি সময় লাগছে।</div>';}
      else if(!res.ok||!data.video){throw new Error(data.error||'ভিডিও তৈরি ব্যর্থ হয়েছে');}
      else{resultEl.innerHTML=`<video src="${data.video}" controls autoplay loop></video>`;}
    }
  }catch(e){resultEl.innerHTML=`<div class="ig-error">${e.message||'একটি সমস্যা হয়েছে'}</div>`;}
  finally{btn.disabled=false;btn.textContent='তৈরি করুন';}
}
</script>
</body>
