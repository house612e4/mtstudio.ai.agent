<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>MT Studio AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e1a; --surface:#11162a; --surface-2:#161d35;
    --border:rgba(124,58,237,0.22); --cyan:#00d4ff;
    --purple:#7c3aed; --purple-bright:#a855f7;
    --text:#e9edf7; --text-muted:#7d869c;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:radial-gradient(ellipse 120% 80% at 50% -10%,#131a33 0%,var(--bg) 55%);
    color:var(--text);font-family:'Noto Sans Bengali','Inter',sans-serif;
    display:flex;flex-direction:column;height:100dvh;overflow:hidden;
  }
  header{
    display:flex;align-items:center;gap:12px;padding:14px 18px;
    border-bottom:1px solid var(--border);background:rgba(10,14,26,0.85);
    backdrop-filter:blur(10px);flex-shrink:0;z-index:10;
  }
  .orb{
    width:30px;height:30px;border-radius:50%;
    background:conic-gradient(from 180deg,var(--cyan),var(--purple-bright),var(--cyan));
    animation:breathe 3.2s ease-in-out infinite;
    box-shadow:0 0 16px rgba(0,212,255,0.35);flex-shrink:0;
  }
  .orb.thinking{animation:breathe 0.9s ease-in-out infinite;}
  @keyframes breathe{0%,100%{transform:scale(1);opacity:0.85;}50%{transform:scale(1.18);opacity:1;}}
  .brand{display:flex;flex-direction:column;line-height:1.15;}
  .brand .name{font-weight:700;font-size:15.5px;}
  .brand .status{font-size:11.5px;color:var(--text-muted);font-family:'Inter',sans-serif;}
  .status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--cyan);margin-right:5px;box-shadow:0 0 6px var(--cyan);}
  #messages{flex:1;overflow-y:auto;padding:20px 16px 10px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth;}
  .empty-state{margin:auto;text-align:center;color:var(--text-muted);display:flex;flex-direction:column;align-items:center;gap:14px;padding:0 30px;}
  .empty-state .big-orb{width:54px;height:54px;border-radius:50%;background:conic-gradient(from 180deg,var(--cyan),var(--purple-bright),var(--cyan));animation:breathe 3.2s ease-in-out infinite;box-shadow:0 0 28px rgba(124,58,237,0.35);}
  .empty-state p{font-size:14.5px;line-height:1.6;}
  .empty-state .hint{font-size:12.5px;color:#5b6378;}
  .msg{max-width:84%;display:flex;flex-direction:column;gap:4px;}
  .msg.user{align-self:flex-end;align-items:flex-end;}
  .msg.ai{align-self:flex-start;align-items:flex-start;}
  .bubble{padding:11px 15px;border-radius:16px;font-size:14.5px;line-height:1.7;word-break:break-word;}
  .msg.user .bubble{background:linear-gradient(135deg,rgba(0,212,255,0.16),rgba(0,212,255,0.08));border:1px solid rgba(0,212,255,0.3);border-bottom-right-radius:5px;white-space:pre-wrap;}
  .msg.ai .bubble{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:5px;}
  .msg-time{font-size:10.5px;color:#4d5468;font-family:'Inter',sans-serif;padding:0 4px;}

  /* Markdown styles */
  .bubble h1,.bubble h2,.bubble h3{font-weight:700;margin:10px 0 6px;color:var(--cyan);line-height:1.3;}
  .bubble h1{font-size:16px;} .bubble h2{font-size:15px;} .bubble h3{font-size:14px;}
  .bubble p{margin:5px 0;}
  .bubble strong{font-weight:700;color:#c4d0f0;}
  .bubble em{font-style:italic;color:#aab4cc;}
  .bubble ul,.bubble ol{padding-left:18px;margin:6px 0;}
  .bubble li{margin:3px 0;line-height:1.6;}
  .bubble code{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);border-radius:4px;padding:1px 6px;font-size:12.5px;font-family:monospace;color:var(--cyan);}
  .bubble pre{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin:8px 0;overflow-x:auto;}
  .bubble pre code{background:none;border:none;padding:0;font-size:12px;color:#c4d0f0;}
  .bubble hr{border:none;border-top:1px solid var(--border);margin:10px 0;}
  .bubble blockquote{border-left:3px solid var(--purple-bright);padding-left:10px;margin:6px 0;color:var(--text-muted);}
  .bubble a{color:var(--cyan);text-decoration:none;}

  .typing{display:flex;gap:5px;padding:13px 16px;}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--purple-bright);animation:bounce 1.1s infinite ease-in-out;}
  .typing span:nth-child(2){animation-delay:0.15s;background:var(--cyan);}
  .typing span:nth-child(3){animation-delay:0.3s;}
  @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:0.5;}40%{transform:translateY(-5px);opacity:1;}}

  .input-bar{flex-shrink:0;padding:12px 14px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--border);background:rgba(10,14,26,0.92);backdrop-filter:blur(10px);display:flex;gap:10px;align-items:flex-end;}
  #input{flex:1;resize:none;max-height:120px;background:var(--surface-2);border:1px solid var(--border);border-radius:20px;padding:11px 16px;color:var(--text);font-family:'Noto Sans Bengali','Inter',sans-serif;font-size:14.5px;line-height:1.5;outline:none;}
  #input:focus{border-color:rgba(0,212,255,0.5);}
  #input::placeholder{color:#5b6378;}
  #send{width:42px;height:42px;border-radius:50%;flex-shrink:0;border:none;cursor:pointer;background:linear-gradient(135deg,var(--cyan),var(--purple));display:flex;align-items:center;justify-content:center;transition:transform 0.15s ease,opacity 0.15s ease;}
  #send:active{transform:scale(0.92);}
  #send:disabled{opacity:0.4;cursor:default;}
  #send svg{width:18px;height:18px;}
  #messages::-webkit-scrollbar{width:4px;}
  #messages::-webkit-scrollbar-thumb{background:rgba(124,58,237,0.3);border-radius:4px;}
</style>
</head>
<body>
<header>
  <div class="orb" id="orb"></div>
  <div class="brand">
    <span class="name">MT Studio AI</span>
    <span class="status"><span class="status-dot"></span>সক্রিয়</span>
  </div>
</header>

<div id="messages">
  <div class="empty-state" id="emptyState">
    <div class="big-orb"></div>
    <p>মাহসিন ভাই, আজ কী নিয়ে কাজ করব?</p>
    <span class="hint">strategy, content, prompt — যেকোনো কিছু লিখুন</span>
  </div>
</div>

<div class="input-bar">
  <textarea id="input" rows="1" placeholder="মেসেজ লিখুন..."></textarea>
  <button id="send" aria-label="পাঠান">
    <svg viewBox="0 0 24 24" fill="none" stroke="#0a0e1a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="19" x2="12" y2="5"></line>
      <polyline points="6 11 12 5 18 11"></polyline>
    </svg>
  </button>
</div>

<script>
  // ====== কনফিগ ======
  const WORKER_URL = "https://hidden-sky-3109.studiomt46.workers.dev";
  const MT_KEY = "amarsopnomtstudioamakebissoporicidibe8019";
  // ====================

  // Simple Markdown Parser
  function parseMarkdown(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      // Code blocks আগে (inline code-এর আগে)
      .replace(/```([\s\S]*?)```/g, (_,c) => `<pre><code>${c.trim()}</code></pre>`)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      // Headings
      .replace(/^### (.+)$/gm,'<h3>$1</h3>')
      .replace(/^## (.+)$/gm,'<h2>$1</h2>')
      .replace(/^# (.+)$/gm,'<h1>$1</h1>')
      // Bold & Italic
      .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      // HR
      .replace(/^---$/gm,'<hr>')
      // Blockquote
      .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
      // Lists
      .replace(/^\- (.+)$/gm,'<li>$1</li>')
      .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
      .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
      // Links
      .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>')
      // Paragraphs — blank line = new paragraph
      .replace(/\n\n+/g,'</p><p>')
      .replace(/\n/g,'<br>')
      .replace(/^(?!<[hup\/<])/,'<p>')
      .replace(/(?<![>])$/,'</p>');
  }

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const orb = document.getElementById('orb');

  // session-এ history রাখা (Firebase-এ সংরক্ষণের পাশাপাশি)
  let sessionHistory = [];

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight,120) + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);

  function timeNow(){
    return new Date().toLocaleTimeString('bn-BD',{hour:'2-digit',minute:'2-digit'});
  }

  function addMessage(role, text){
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (role==='user' ? 'user' : 'ai');
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'ai') {
      bubble.innerHTML = parseMarkdown(text);
    } else {
      bubble.textContent = text;
    }
    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = timeNow();
    wrap.appendChild(bubble);
    wrap.appendChild(time);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping(){
    const wrap = document.createElement('div');
    wrap.className = 'msg ai'; wrap.id = 'typingIndicator';
    wrap.innerHTML = '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function hideTyping(){ const el=document.getElementById('typingIndicator'); if(el) el.remove(); }

  async function send(){
    const text = inputEl.value.trim();
    if (!text) return;
    addMessage('user', text);
    inputEl.value = ''; inputEl.style.height = 'auto';
    sendBtn.disabled = true; orb.classList.add('thinking');
    showTyping();

    // session history-তে যোগ করা
    sessionHistory.push({ role:'user', content:text });

    try {
      const res = await fetch(WORKER_URL, {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'X-MT-Key': MT_KEY },
        body: JSON.stringify({
          message: text,
          history: sessionHistory.slice(-20), // শেষ ২০টা পাঠাচ্ছি context-এর জন্য
          conversationId: 'mahsin-main',
        }),
      });
      const data = await res.json();
      hideTyping();
      if (!res.ok) {
        addMessage('ai','সমস্যা হয়েছে: ' + (data.error || 'অজানা ত্রুটি'));
      } else {
        addMessage('ai', data.reply || '...');
        sessionHistory.push({ role:'assistant', content: data.reply });
        // শুধু শেষ ৪০টা রাখি
        if (sessionHistory.length > 40) sessionHistory = sessionHistory.slice(-40);
      }
    } catch(err) {
      hideTyping();
      addMessage('ai','সংযোগে সমস্যা হয়েছে।');
    } finally {
      sendBtn.disabled = false; orb.classList.remove('thinking');
      inputEl.focus();
    }
  }
</script>
</body>
</html>
