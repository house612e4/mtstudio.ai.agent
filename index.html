<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#050B14">
<title>MtStudio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050B14;--surface:#0d1320;--surface-2:#141b2b;--surface-3:#1c2536;
  --border:rgba(255,255,255,0.07);--border-2:rgba(255,255,255,0.12);
  --cyan:#22d3ee;--cyan-deep:#0891b2;--violet:#7c3aed;--violet-bright:#8b5cf6;
  --blue:#3b82f6;--green:#10b981;
  --text:#e8edf4;--text-2:#9aa6b8;--text-3:#5b6478;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans Bengali','Inter',sans-serif;display:flex;flex-direction:column;height:100dvh;}
button{font-family:inherit;}
.star{background:linear-gradient(135deg,var(--cyan),var(--violet-bright) 50%,var(--blue));clip-path:polygon(50% 0%,61% 39%,100% 50%,61% 61%,50% 100%,39% 61%,0% 50%,39% 39%);}
#authScreen{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px calc(32px + env(safe-area-inset-bottom));}
#authScreen.show{display:flex;}
.auth-star{width:64px;height:64px;margin-bottom:24px;}
.auth-title{font-size:26px;font-weight:600;text-align:center;margin-bottom:8px;}
.auth-sub{font-size:14.5px;color:var(--text-2);text-align:center;margin-bottom:32px;line-height:1.5;}
.auth-input{width:100%;max-width:340px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:14px;padding:15px 18px;color:var(--text);font-size:15px;outline:none;margin-bottom:12px;font-family:inherit;}
.auth-input:focus{border-color:var(--cyan);}
.auth-btn{width:100%;max-width:340px;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--cyan-deep),var(--violet));color:#fff;font-size:15.5px;font-weight:600;cursor:pointer;margin-top:6px;}
.auth-btn:disabled{opacity:0.5;}
.auth-google{width:100%;max-width:340px;padding:14px;border-radius:14px;border:1px solid var(--border-2);background:var(--surface);color:var(--text);font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;}
.auth-google svg{width:20px;height:20px;}
.auth-divider{display:flex;align-items:center;gap:12px;width:100%;max-width:340px;margin:14px 0;color:var(--text-3);font-size:12px;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.auth-switch{margin-top:20px;font-size:14px;color:var(--text-2);}
.auth-switch span{color:var(--cyan);font-weight:600;cursor:pointer;}
.auth-error{color:#f87171;font-size:13px;margin-bottom:12px;text-align:center;max-width:340px;min-height:18px;}
.auth-skip{margin-top:18px;font-size:13.5px;color:var(--text-3);cursor:pointer;text-decoration:underline;}
#drawerOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:40;}
#drawerOverlay.open{display:block;}
#drawer{position:fixed;left:-310px;top:0;bottom:0;width:296px;background:var(--bg);z-index:50;display:flex;flex-direction:column;transition:left 0.25s cubic-bezier(0.4,0,0.2,1);padding-bottom:env(safe-area-inset-bottom);}
#drawer.open{left:0;}
.drawer-top{padding:22px 22px 10px;display:flex;align-items:center;gap:11px;}
.drawer-top .star{width:25px;height:25px;}
.drawer-top .bt{font-size:21px;font-weight:600;}
.new-chat-pill{display:flex;align-items:center;gap:13px;margin:14px 14px 6px;padding:13px 18px;border-radius:26px;background:var(--surface-2);border:none;color:var(--text);font-size:14.5px;font-weight:500;cursor:pointer;width:calc(100% - 28px);}
.new-chat-pill svg{width:19px;height:19px;color:var(--text-2);}
.drawer-nav-item{display:flex;align-items:center;gap:19px;padding:13px 22px;border:none;background:transparent;color:var(--text);cursor:pointer;width:100%;text-align:left;font-size:15px;}
.drawer-nav-item svg{width:21px;height:21px;color:var(--text-2);flex-shrink:0;}
.drawer-sep{height:1px;background:var(--border);margin:10px 22px;}
.drawer-recent-label{font-size:13px;font-weight:500;color:var(--text-2);padding:12px 22px 6px;}
.drawer-recent-item{display:block;padding:11px 22px;color:var(--text-2);font-size:14px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:none;border:none;width:100%;text-align:left;}
.drawer-recent-item:active{background:var(--surface-2);}
.drawer-spacer{flex:1;}
.drawer-bottom-item{display:flex;align-items:center;gap:14px;padding:14px 20px calc(14px + env(safe-area-inset-bottom));border:none;background:transparent;color:var(--text);cursor:pointer;width:100%;text-align:left;font-size:14.5px;border-top:1px solid var(--border);}
.drawer-bottom-item .mini-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--cyan-deep),var(--violet));display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;flex-shrink:0;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;flex-shrink:0;position:relative;z-index:30;}
.tb-circle{width:42px;height:42px;border-radius:50%;border:none;background:var(--surface-2);cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tb-circle svg{width:21px;height:21px;}
.model-trigger{display:flex;align-items:center;gap:5px;background:transparent;border:none;cursor:pointer;color:var(--text);font-size:20px;font-weight:600;padding:8px 10px;border-radius:10px;}
.model-trigger .v-name{color:var(--text-2);font-weight:400;}
.model-trigger svg{width:17px;height:17px;color:var(--text-2);margin-left:1px;transition:transform 0.2s;}
.model-trigger.open svg{transform:rotate(180deg);}
.model-dropdown{position:absolute;top:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--border-2);border-radius:18px;padding:8px;min-width:265px;box-shadow:0 8px 32px rgba(0,0,0,0.6);display:none;z-index:100;max-height:70vh;overflow-y:auto;}
.model-dropdown.open{display:block;}
.mg-label{font-size:11px;font-weight:600;color:var(--text-3);padding:8px 12px 4px;letter-spacing:0.5px;text-transform:uppercase;}
.mo{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;cursor:pointer;width:100%;border:none;background:transparent;text-align:left;color:var(--text);}
.mo:active{background:var(--surface-3);}
.mo.selected{background:rgba(34,211,238,0.1);}
.mo .chk{width:17px;height:17px;margin-left:auto;color:var(--cyan);opacity:0;flex-shrink:0;}
.mo.selected .chk{opacity:1;}
.mo-icon{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.ic-ar{background:linear-gradient(135deg,var(--cyan-deep),var(--violet));color:#fff;}
.ic-cl{background:rgba(124,58,237,0.18);color:var(--violet-bright);}
.ic-gp{background:rgba(16,185,129,0.15);color:var(--green);}
.ic-gm{background:rgba(59,130,246,0.15);color:var(--blue);}
.dd-div{height:1px;background:var(--border);margin:6px 4px;}
.mo-info .mn{font-size:14.5px;font-weight:500;}
.mo-info .md{font-size:11.5px;color:var(--text-3);margin-top:1px;}
#chat{flex:1;overflow-y:auto;padding:0 0 8px;scroll-behavior:smooth;}
#chat::-webkit-scrollbar{width:0;}
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:88%;padding:24px;text-align:center;}
#welcome .wstar{width:42px;height:42px;margin-bottom:26px;}
.w-greeting{font-size:32px;font-weight:600;line-height:1.3;color:var(--text);letter-spacing:-0.4px;}
.msg-group{padding:7px 16px;}
.msg-group.user{display:flex;justify-content:flex-end;}
.msg-group.ai{display:flex;justify-content:flex-start;padding-left:10px;}
.msg-content{display:flex;flex-direction:column;gap:4px;max-width:88%;}
.msg-meta{font-size:11px;color:var(--text-3);padding:2px 4px 0;}
.bubble{padding:13px 17px;border-radius:22px;font-size:15.5px;line-height:1.65;word-break:break-word;}
.msg-group.user .bubble{background:var(--surface-2);border-bottom-right-radius:6px;white-space:pre-wrap;}
.msg-group.ai .bubble{background:transparent;padding:8px;}
.bubble h1,.bubble h2,.bubble h3{font-weight:600;margin:12px 0 6px;line-height:1.3;}
.bubble h1{font-size:18px;}.bubble h2{font-size:16.5px;}.bubble h3{font-size:15.5px;color:var(--violet-bright);}
.bubble p{margin:6px 0;}.bubble strong{font-weight:700;color:#f1f5f9;}.bubble em{font-style:italic;color:var(--text-2);}
.bubble ul,.bubble ol{padding-left:22px;margin:6px 0;}.bubble li{margin:4px 0;line-height:1.6;}
.bubble code{background:rgba(34,211,238,0.08);border-radius:5px;padding:1px 7px;font-size:13px;font-family:monospace;color:var(--cyan);}
.bubble pre{background:rgba(0,0,0,0.5);border-radius:12px;padding:14px;margin:8px 0;overflow-x:auto;}
.bubble pre code{background:none;padding:0;font-size:12.5px;}
.bubble hr{border:none;border-top:1px solid var(--border);margin:10px 0;}
.bubble blockquote{border-left:3px solid var(--violet-bright);padding-left:12px;margin:6px 0;color:var(--text-2);}
.bubble a{color:var(--cyan);}
.typing-wrap{display:flex;gap:5px;padding:14px 8px;}
.typing-wrap span{width:7px;height:7px;border-radius:50%;animation:tb 1.1s infinite ease-in-out;background:var(--cyan);}
.typing-wrap span:nth-child(2){animation-delay:0.15s;background:var(--violet-bright);}
.typing-wrap span:nth-child(3){animation-delay:0.3s;background:var(--blue);}
@keyframes tb{0%,80%,100%{transform:translateY(0);opacity:0.4;}40%{transform:translateY(-6px);opacity:1;}}
#input-area{flex-shrink:0;padding:8px 14px calc(14px + env(safe-area-inset-bottom));}
.input-box{background:var(--surface-2);border-radius:30px;padding:7px 8px 7px 8px;display:flex;align-items:center;gap:4px;}
.in-plus{width:42px;height:42px;border-radius:50%;border:none;background:transparent;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.in-plus svg{width:24px;height:24px;}
#input{flex:1;resize:none;max-height:120px;min-height:26px;background:transparent;border:none;outline:none;color:var(--text);font-size:16px;line-height:1.5;font-family:'Noto Sans Bengali','Inter',sans-serif;padding:8px 4px;}
#input::placeholder{color:var(--text-3);}
.in-mic{width:42px;height:42px;border-radius:50%;border:none;background:transparent;color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.in-mic svg{width:21px;height:21px;}
.in-live{width:42px;height:42px;border-radius:50%;border:none;background:var(--blue);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.in-live svg{width:20px;height:20px;}
.send-btn{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--cyan-deep),var(--violet));display:none;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn svg{width:19px;height:19px;}
.input-box.has-text .in-mic,.input-box.has-text .in-live{display:none;}
.input-box.has-text .send-btn{display:flex;}
#ddOverlay{display:none;position:fixed;inset:0;z-index:20;}
#ddOverlay.open{display:block;}
#sheetOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:70;}
#sheetOverlay.open{display:block;}
#plusSheet{position:fixed;left:0;right:0;bottom:-100%;background:var(--surface);border-radius:28px 28px 0 0;z-index:80;padding:10px 16px calc(24px + env(safe-area-inset-bottom));transition:bottom 0.28s cubic-bezier(0.4,0,0.2,1);max-height:80vh;overflow-y:auto;}
#plusSheet.open{bottom:0;}
.sheet-grip{width:38px;height:4px;border-radius:3px;background:var(--surface-3);margin:4px auto 16px;}
.sheet-cards{display:flex;gap:12px;margin-bottom:8px;}
.sheet-card{flex:1;background:var(--surface-2);border:none;border-radius:20px;padding:32px 16px;color:var(--text);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:12px;font-size:16px;font-weight:500;}
.sheet-card svg{width:26px;height:26px;}
.sheet-item{display:flex;align-items:center;gap:18px;padding:15px 8px;border:none;background:transparent;color:var(--text);cursor:pointer;width:100%;text-align:left;}
.sheet-item svg{width:24px;height:24px;color:var(--text);flex-shrink:0;}
.sheet-item-text .si1{font-size:16px;font-weight:500;}
.sheet-item-text .si2{font-size:13px;color:var(--text-2);margin-top:1px;}
#acctOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:70;}
#acctOverlay.open{display:block;}
#acctSheet{position:fixed;left:0;right:0;bottom:-100%;background:var(--surface);border-radius:28px 28px 0 0;z-index:80;padding:0 0 calc(20px + env(safe-area-inset-bottom));transition:bottom 0.28s cubic-bezier(0.4,0,0.2,1);max-height:88vh;overflow-y:auto;}
#acctSheet.open{bottom:0;}
.acct-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 10px;position:sticky;top:0;background:var(--surface);}
.acct-email{font-size:15px;font-weight:500;}
.acct-done{color:var(--cyan);font-size:16px;font-weight:600;background:none;border:none;cursor:pointer;}
.acct-avatar-big{width:78px;height:78px;border-radius:50%;background:linear-gradient(135deg,var(--cyan-deep),var(--violet));display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;font-weight:600;margin:8px auto 12px;}
.acct-hi{text-align:center;font-size:21px;font-weight:600;margin-bottom:16px;}
.acct-manage{display:block;margin:0 auto 18px;padding:12px 28px;border-radius:24px;border:1px solid var(--border-2);background:transparent;color:var(--cyan);font-size:14.5px;font-weight:600;cursor:pointer;}
.acct-switch{display:flex;align-items:center;justify-content:space-between;margin:0 16px 18px;padding:15px 20px;border-radius:24px;background:var(--surface-2);border:none;color:var(--text);cursor:pointer;width:calc(100% - 32px);}
.acct-switch .as-left{font-size:15.5px;font-weight:500;}
.acct-switch .as-right{display:flex;align-items:center;gap:6px;color:var(--text-2);}
.acct-switch .as-chev{width:18px;height:18px;}
.acct-section-label{font-size:13px;color:var(--text-2);padding:6px 24px 8px;}
.acct-item{display:flex;align-items:center;gap:18px;padding:16px 24px;border:none;background:transparent;color:var(--text);cursor:pointer;width:100%;text-align:left;font-size:15.5px;}
.acct-item svg{width:22px;height:22px;color:var(--text);flex-shrink:0;}
.acct-signout{color:#f87171;}
.acct-signout svg{color:#f87171;}
.panel{position:fixed;inset:0;background:var(--bg);z-index:60;display:none;flex-direction:column;padding-bottom:env(safe-area-inset-bottom);}
.panel.open{display:flex;}
.panel-header{display:flex;align-items:center;gap:16px;padding:16px;flex-shrink:0;}
.panel-title{font-size:20px;font-weight:600;}
.panel-body{flex:1;overflow-y:auto;padding:8px 16px;}
.ig-tabs{display:flex;gap:8px;padding:4px 0 16px;}
.ig-tab{flex:1;padding:11px;border-radius:24px;border:none;background:var(--surface-2);color:var(--text-2);font-size:14px;font-weight:500;cursor:pointer;}
.ig-tab.active{background:linear-gradient(135deg,var(--cyan-deep),var(--violet));color:#fff;}
.ig-textarea{width:100%;background:var(--surface-2);border:none;border-radius:18px;padding:16px;color:var(--text);font-size:15px;font-family:'Noto Sans Bengali','Inter',sans-serif;resize:vertical;outline:none;margin-bottom:14px;}
.ig-select{width:100%;background:var(--surface-2);border:none;border-radius:14px;padding:13px 16px;color:var(--text);font-size:14.5px;margin-bottom:14px;outline:none;}
.ig-generate-btn{width:100%;padding:15px;border-radius:18px;border:none;background:linear-gradient(135deg,var(--cyan-deep),var(--violet));color:#fff;font-size:15.5px;font-weight:600;cursor:pointer;}
.ig-generate-btn:disabled{opacity:0.5;}
#igResult{margin-top:16px;}
#igResult img,#igResult video{width:100%;border-radius:18px;}
.ig-status{text-align:center;color:var(--text-2);font-size:13.5px;padding:24px;}
.ig-error{color:#f87171;font-size:13.5px;text-align:center;padding:14px;background:rgba(248,113,113,0.08);border-radius:14px;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:16px 4px;}
.setting-row-left{display:flex;align-items:center;gap:16px;}
.setting-row-left svg{width:22px;height:22px;color:var(--text-2);}
.setting-row-text .t1{font-size:15.5px;}
.setting-row-text .t2{font-size:12.5px;color:var(--text-2);margin-top:2px;}
.toggle{width:42px;height:24px;border-radius:12px;background:var(--cyan-deep);position:relative;cursor:pointer;border:none;flex-shrink:0;}
.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:21px;transition:left 0.2s;}
.toggle.off{background:var(--surface-3);}
.toggle.off::after{left:3px;}
.settings-divider{height:1px;background:var(--border);margin:6px 0;}
</style>
</head>
<body>
<div id="authScreen">
  <div class="auth-star star"></div>
  <div class="auth-title" id="authTitle">MtStudio-তে স্বাগতম</div>
  <div class="auth-sub" id="authSub">আরমানের সাথে কাজ শুরু করতে সাইন ইন করুন</div>
  <div class="auth-error" id="authError"></div>
  <button class="auth-google" onclick="googleSignIn()">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Google দিয়ে চালিয়ে যান
  </button>
  <div class="auth-divider">অথবা</div>
  <input type="email" class="auth-input" id="authEmail" placeholder="ইমেইল" autocomplete="email">
  <input type="password" class="auth-input" id="authPassword" placeholder="পাসওয়ার্ড" autocomplete="current-password">
  <button class="auth-btn" id="authSubmit" onclick="emailAuth()">সাইন ইন</button>
  <div class="auth-switch" id="authSwitch">অ্যাকাউন্ট নেই? <span onclick="toggleAuthMode()">সাইন আপ করুন</span></div>
  <div class="auth-skip" onclick="skipAuth()">আপাতত এড়িয়ে যান</div>
</div>
<div id="drawerOverlay" onclick="closeDrawer()"></div>
<div id="drawer">
  <div class="drawer-top"><div class="star"></div><span class="bt">MtStudio</span></div>

<script>
const firebaseConfig = {
  apiKey: "FIREBASE_API_KEY",
  authDomain: "mt-studio-92d1e.firebaseapp.com",
  projectId: "mt-studio-92d1e",
  storageBucket: "mt-studio-92d1e.appspot.com",
  messagingSenderId: "FIREBASE_SENDER_ID",
  appId: "FIREBASE_APP_ID"
};
let auth=null, firebaseReady=false;
try{ firebase.initializeApp(firebaseConfig); auth=firebase.auth(); firebaseReady=true; }catch(e){ console.log('Firebase init skip',e); }

const WORKER_URL="https://mt-ai.studiomt46.workers.dev/";
const MT_KEY="mtai2026";
const safeStorage={get(k,f){try{return localStorage.getItem(k)??f;}catch(e){return f;}},set(k,v){try{localStorage.setItem(k,v);}catch(e){}},remove(k){try{localStorage.removeItem(k);}catch(e){}}};
let cType='arman',cVersion='Pro',cBrand='আরমান',cModelId='grok-4.3',cPill='p-ar';
let sessionHistory=[],chatHistories=JSON.parse(safeStorage.get('mtstudio_histories','[]')),memoryOn=true;
let currentUser=null, authMode='signin';
const chatEl=document.getElementById('chat'),inputEl=document.getElementById('input'),sendBtn=document.getElementById('send'),inputBox=document.getElementById('inputBox');

if(firebaseReady){
  auth.onAuthStateChanged(u=>{
    currentUser=u;
    if(u){ hideAuth(); applyUser(u); }
    else if(safeStorage.get('mt_skipped_auth','')!=='1'){ showAuth(); }
  });
}else{ if(safeStorage.get('mt_skipped_auth','')!=='1') showAuth(); }

function showAuth(){document.getElementById('authScreen').classList.add('show');}
function hideAuth(){document.getElementById('authScreen').classList.remove('show');}
function skipAuth(){safeStorage.set('mt_skipped_auth','1');hideAuth();}
function toggleAuthMode(){
  authMode=authMode==='signin'?'signup':'signin';
  document.getElementById('authTitle').textContent=authMode==='signin'?'MtStudio-তে স্বাগতম':'নতুন অ্যাকাউন্ট';
  document.getElementById('authSub').textContent=authMode==='signin'?'আরমানের সাথে কাজ শুরু করতে সাইন ইন করুন':'কয়েক সেকেন্ডে অ্যাকাউন্ট তৈরি করুন';
  document.getElementById('authSubmit').textContent=authMode==='signin'?'সাইন ইন':'সাইন আপ';
  document.getElementById('authSwitch').innerHTML=authMode==='signin'?'অ্যাকাউন্ট নেই? <span onclick="toggleAuthMode()">সাইন আপ করুন</span>':'অ্যাকাউন্ট আছে? <span onclick="toggleAuthMode()">সাইন ইন করুন</span>';
  document.getElementById('authError').textContent='';
}
function authErr(m){document.getElementById('authError').textContent=m;}
async function emailAuth(){
  if(!firebaseReady){authErr('Firebase কনফিগার করা হয়নি');return;}
  const email=document.getElementById('authEmail').value.trim(),pass=document.getElementById('authPassword').value;
  if(!email||!pass){authErr('ইমেইল ও পাসওয়ার্ড দিন');return;}
  const btn=document.getElementById('authSubmit');btn.disabled=true;authErr('');
  try{
    if(authMode==='signin') await auth.signInWithEmailAndPassword(email,pass);
    else await auth.createUserWithEmailAndPassword(email,pass);
  }catch(e){authErr(authErrMsg(e.code));}
  finally{btn.disabled=false;}
}
async function googleSignIn(){
  if(!firebaseReady){authErr('Firebase কনফিগার করা হয়নি');return;}
  try{ const p=new firebase.auth.GoogleAuthProvider(); await auth.signInWithPopup(p); }
  catch(e){ authErr(authErrMsg(e.code)); }
}
function authErrMsg(code){
  const m={'auth/invalid-email':'ভুল ইমেইল','auth/user-not-found':'অ্যাকাউন্ট পাওয়া যায়নি','auth/wrong-password':'ভুল পাসওয়ার্ড','auth/email-already-in-use':'এই ইমেইল আগে থেকেই আছে','auth/weak-password':'পাসওয়ার্ড দুর্বল (৬+ অক্ষর)','auth/invalid-credential':'ভুল ইমেইল বা পাসওয়ার্ড','auth/popup-closed-by-user':'সাইন ইন বাতিল হয়েছে'};
  return m[code]||'সমস্যা হয়েছে, আবার চেষ্টা করুন';
}
function applyUser(u){
  const name=u.displayName||u.email?.split('@')[0]||'ব্যবহারকারী';
  const letter=(name[0]||'M').toUpperCase();
  document.getElementById('drawerAvatar').textContent=letter;
  document.getElementById('drawerName').textContent=name;
  document.getElementById('acctAvatarBig').textContent=letter;
  document.getElementById('acctHi').textContent='Hi, '+name+'!';
  document.getElementById('acctEmail').textContent=u.email||'';
  document.getElementById('settingsName').textContent=name;
  document.getElementById('settingsEmail').textContent=u.email||'MtStudio AI';
  renderWelcome(name);
}
function switchAccount(){ if(firebaseReady){ const p=new firebase.auth.GoogleAuthProvider(); p.setCustomParameters({prompt:'select_account'}); auth.signInWithPopup(p).catch(e=>{}); } }
function signOutUser(){ if(firebaseReady&&auth){ auth.signOut(); } safeStorage.remove('mt_skipped_auth'); closeAccount(); showAuth(); }

function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawerOverlay').classList.add('open');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawerOverlay').classList.remove('open');}
function openAccount(){closeDrawer();document.getElementById('acctSheet').classList.add('open');document.getElementById('acctOverlay').classList.add('open');}
function closeAccount(){document.getElementById('acctSheet').classList.remove('open');document.getElementById('acctOverlay').classList.remove('open');}
function openSettingsFromAcct(){closeAccount();document.getElementById('settingsPanel').classList.add('open');}
function closeSettings(){document.getElementById('settingsPanel').classList.remove('open');}
function openImageGen(){document.getElementById('imageGenPanel').classList.add('open');}
function closeImageGen(){document.getElementById('imageGenPanel').classList.remove('open');}
function openPlusSheet(){document.getElementById('plusSheet').classList.add('open');document.getElementById('sheetOverlay').classList.add('open');}
function closePlusSheet(){document.getElementById('plusSheet').classList.remove('open');document.getElementById('sheetOverlay').classList.remove('open');}
function toggleDD(){document.getElementById('modelDropdown').classList.toggle('open');document.getElementById('modelTrigger').classList.toggle('open');document.getElementById('ddOverlay').classList.toggle('open');}
function closeDD(){document.getElementById('modelDropdown').classList.remove('open');document.getElementById('modelTrigger').classList.remove('open');document.getElementById('ddOverlay').classList.remove('open');}
function toggleMemory(){memoryOn=!memoryOn;document.getElementById('memoryToggle').classList.toggle('off',!memoryOn);}
function sel(type,ver,brand,id,pill,btn){cType=type;cVersion=ver;cBrand=brand;cModelId=id;cPill=pill;document.getElementById('brandName').textContent=brand;document.getElementById('versionName').textContent=ver;document.querySelectorAll('.mo').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');closeDD();}
function getPill(p){return p==='p-ar'?'আরমান':p==='p-cl'?'Claude':p==='p-gp'?'GPT':'Gemini';}
function md(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/```([\s\S]*?)```/g,(_,c)=>`<pre><code>${c.trim()}</code></pre>`).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>').replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/^---$/gm,'<hr>').replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>').replace(/^\- (.+)$/gm,'<li>$1</li>').replace(/^\d+\. (.+)$/gm,'<li>$1</li>').replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>').replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>').replace(/\n\n+/g,'</p><p>').replace(/\n/g,'<br>');}
function timeNow(){return new Date().toLocaleTimeString('bn-BD',{hour:'2-digit',minute:'2-digit'});}
function renderWelcome(name){const n=name||(currentUser&&(currentUser.displayName||currentUser.email?.split('@')[0]))||'মাহসিন';const w=document.getElementById('welcome');if(w)w.innerHTML=`<div class="wstar star"></div><div class="w-greeting">আজকে কী করব,<br>${n}?</div>`;}
function removeWelcome(){const w=document.getElementById('welcome');if(w)w.remove();}
function addMsg(role,text,pill='p-ar'){removeWelcome();const w=document.createElement('div');w.className=`msg-group ${role}`;if(role==='ai'){w.innerHTML=`<div class="msg-content"><div class="msg-meta">${getPill(pill)} · ${timeNow()}</div><div class="bubble">${md(text)}</div></div>`;}else{w.innerHTML=`<div class="msg-content"><div class="bubble">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>`;}chatEl.appendChild(w);chatEl.scrollTop=chatEl.scrollHeight;}
function showTyping(){const w=document.createElement('div');w.className='msg-group ai';w.id='typing';w.innerHTML=`<div class="msg-content"><div class="bubble"><div class="typing-wrap"><span></span><span></span><span></span></div></div></div>`;chatEl.appendChild(w);chatEl.scrollTop=chatEl.scrollHeight;}
function hideTyping(){const e=document.getElementById('typing');if(e)e.remove();}
function newChat(){if(sessionHistory.length>0){const first=sessionHistory[0]?.content?.slice(0,40)||'নতুন চ্যাট';chatHistories.unshift({id:Date.now(),title:first});if(chatHistories.length>15)chatHistories.pop();safeStorage.set('mtstudio_histories',JSON.stringify(chatHistories));renderHistory();}sessionHistory=[];chatEl.innerHTML='<div id="welcome"></div>';renderWelcome();}
function renderHistory(){const el=document.getElementById('chatHistory');el.innerHTML=chatHistories.slice(0,10).map(h=>`<button class="drawer-recent-item">${h.title}</button>`).join('');}
function clearAllHistory(){if(confirm('সব চ্যাট ইতিহাস মুছে যাবে?')){chatHistories=[];safeStorage.remove('mtstudio_histories');renderHistory();newChat();closeAccount();closeSettings();}}
async function send(){const text=inputEl.value.trim();if(!text)return;addMsg('user',text);inputEl.value='';inputEl.style.height='auto';updateInputState();showTyping();sessionHistory.push({role:'user',content:text});const pill=cPill;try{const res=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json','X-MT-Key':MT_KEY},body:JSON.stringify({message:text,model:cModelId,modelType:cType,history:sessionHistory.slice(-20),conversationId:(currentUser&&currentUser.uid)||'mahsin-main'})});const data=await res.json();hideTyping();if(!res.ok){addMsg('ai','সমস্যা: '+(data.error||'ত্রুটি'),pill);}else{addMsg('ai',data.reply||'...',pill);sessionHistory.push({role:'assistant',content:data.reply});if(sessionHistory.length>40)sessionHistory=sessionHistory.slice(-40);}}catch(e){hideTyping();addMsg('ai','সংযোগে সমস্যা হয়েছে।',pill);}}
function updateInputState(){inputBox.classList.toggle('has-text',inputEl.value.trim().length>0);}
inputEl.addEventListener('input',()=>{inputEl.style.height='auto';inputEl.style.height=Math.min(inputEl.scrollHeight,120)+'px';updateInputState();});
inputEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});

let genMode='image';
function switchGenMode(mode){genMode=mode;document.getElementById('igTabImage').classList.toggle('active',mode==='image');document.getElementById('igTabVideo').classList.toggle('active',mode==='video');document.getElementById('igOptionsImage').style.display=mode==='image'?'block':'none';document.getElementById('igOptionsVideo').style.display=mode==='video'?'block':'none';document.getElementById('igResult').innerHTML='';}
async function generateMedia(){
  const prompt=document.getElementById('igPrompt').value.trim();
  if(!prompt){alert('কিছু লিখুন প্রথমে');return;}
  const btn=document.getElementById('igGenBtn'),resultEl=document.getElementById('igResult');
  btn.disabled=true;btn.textContent='তৈরি হচ্ছে...';resultEl.innerHTML='<div class="ig-status">আরমান কাজ করছে...</div>';
  try{
    if(genMode==='image'){
      const aspect=document.getElementById('igAspect').value;
      const res=await fetch(WORKER_URL.replace(/\/$/,'')+'/image-gen',{method:'POST',headers:{'Content-Type':'application/json','X-MT-Key':MT_KEY},body:JSON.stringify({prompt,aspect_ratio:aspect})});
      const data=await res.json();
      if(!res.ok||!data.images){throw new Error(data.error||'ছবি তৈরি ব্যর্থ হয়েছে');}
      resultEl.innerHTML=data.images.map(u=>`<img src="${u}" alt="generated">`).join('');
    }else{
      const duration=parseInt(document.getElementById('igDuration').value);
      const res=await fetch(WORKER_URL.replace(/\/$/,'')+'/video-gen',{method:'POST',headers:{'Content-Type':'application/json','X-MT-Key':MT_KEY},body:JSON.stringify({prompt,duration})});
      const data=await res.json();
      if(res.status===202){resultEl.innerHTML='<div class="ig-status">ভিডিও তৈরি হতে বেশি সময় লাগছে।</div>';}
      else if(!res.ok||!data.video){throw new Error(data.error||'ভিডিও তৈরি ব্যর্থ হয়েছে');}
      else{resultEl.innerHTML=`<video src="${data.video}" controls autoplay loop></video>`;}
    }
  }catch(e){resultEl.innerHTML=`<div class="ig-error">${e.message||'সমস্যা হয়েছে'}</div>`;}
  finally{btn.disabled=false;btn.textContent='তৈরি করুন';}
}

renderWelcome();renderHistory();
document.getElementById('memoryToggle').classList.toggle('off',!memoryOn);
</script>
