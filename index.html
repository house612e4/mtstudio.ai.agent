<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>MT Studio AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0e1a;
    --surface: #11162a;
    --surface-2: #161d35;
    --border: rgba(124,58,237,0.22);
    --cyan: #00d4ff;
    --purple: #7c3aed;
    --purple-bright: #a855f7;
    --text: #e9edf7;
    --text-muted: #7d869c;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background: radial-gradient(ellipse 120% 80% at 50% -10%, #131a33 0%, var(--bg) 55%);
    color: var(--text);
    font-family:'Noto Sans Bengali','Inter',sans-serif;
    display:flex; flex-direction:column;
    height:100dvh; overflow:hidden;
  }

  /* ===== Header ===== */
  header{
    display:flex; align-items:center; gap:12px;
    padding:14px 18px;
    border-bottom:1px solid var(--border);
    background:rgba(10,14,26,0.85);
    backdrop-filter:blur(10px);
    flex-shrink:0;
    z-index:10;
  }
  .orb{
    width:30px; height:30px; border-radius:50%;
    background:conic-gradient(from 180deg, var(--cyan), var(--purple-bright), var(--cyan));
    filter:blur(0.3px);
    animation: breathe 3.2s ease-in-out infinite;
    box-shadow:0 0 16px rgba(0,212,255,0.35);
    flex-shrink:0;
  }
  .orb.thinking{ animation: breathe 0.9s ease-in-out infinite; }
  @keyframes breathe{
    0%,100%{ transform:scale(1); opacity:0.85; }
    50%{ transform:scale(1.18); opacity:1; }
  }
  .brand{ display:flex; flex-direction:column; line-height:1.15; }
  .brand .name{ font-weight:700; font-size:15.5px; letter-spacing:0.2px; }
  .brand .status{ font-size:11.5px; color:var(--text-muted); font-family:'Inter',sans-serif; }
  .status-dot{ display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--cyan); margin-right:5px; box-shadow:0 0 6px var(--cyan); }

  /* ===== Messages ===== */
  #messages{
    flex:1; overflow-y:auto;
    padding:20px 16px 10px;
    display:flex; flex-direction:column; gap:14px;
    scroll-behavior:smooth;
  }
  .empty-state{
    margin:auto; text-align:center; color:var(--text-muted);
    display:flex; flex-direction:column; align-items:center; gap:14px;
    padding:0 30px;
  }
  .empty-state .big-orb{
    width:54px; height:54px; border-radius:50%;
    background:conic-gradient(from 180deg, var(--cyan), var(--purple-bright), var(--cyan));
    animation: breathe 3.2s ease-in-out infinite;
    box-shadow:0 0 28px rgba(124,58,237,0.35);
  }
  .empty-state p{ font-size:14.5px; line-height:1.6; }
  .empty-state .hint{ font-size:12.5px; color:#5b6378; }

  .msg{ max-width:84%; display:flex; flex-direction:column; gap:4px; }
  .msg.user{ align-self:flex-end; align-items:flex-end; }
  .msg.ai{ align-self:flex-start; align-items:flex-start; }

  .bubble{
    padding:11px 15px; border-radius:16px;
    font-size:14.5px; line-height:1.65;
    white-space:pre-wrap; word-break:break-word;
  }
  .msg.user .bubble{
    background:linear-gradient(135deg, rgba(0,212,255,0.16), rgba(0,212,255,0.08));
    border:1px solid rgba(0,212,255,0.3);
    border-bottom-right-radius:5px;
  }
  .msg.ai .bubble{
    background:var(--surface);
    border:1px solid var(--border);
    border-bottom-left-radius:5px;
  }
  .msg-time{ font-size:10.5px; color:#4d5468; font-family:'Inter',sans-serif; padding:0 4px; }

  .typing{ display:flex; gap:5px; padding:13px 16px; }
  .typing span{
    width:6px; height:6px; border-radius:50%;
    background:var(--purple-bright);
    animation: bounce 1.1s infinite ease-in-out;
  }
  .typing span:nth-child(2){ animation-delay:0.15s; background:var(--cyan); }
  .typing span:nth-child(3){ animation-delay:0.3s; }
  @keyframes bounce{ 0%,80%,100%{ transform:translateY(0); opacity:0.5; } 40%{ transform:translateY(-5px); opacity:1; } }

  /* ===== Input ===== */
  .input-bar{
    flex-shrink:0;
    padding:12px 14px calc(14px + env(safe-area-inset-bottom));
    border-top:1px solid var(--border);
    background:rgba(10,14,26,0.92);
    backdrop-filter:blur(10px);
    display:flex; gap:10px; align-items:flex-end;
  }
  #input{
    flex:1; resize:none; max-height:120px;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:20px;
    padding:11px 16px;
    color:var(--text);
    font-family:'Noto Sans Bengali','Inter',sans-serif;
    font-size:14.5px; line-height:1.5;
    outline:none;
  }
  #input:focus{ border-color:rgba(0,212,255,0.5); }
  #input::placeholder{ color:#5b6378; }

  #send{
    width:42px; height:42px; border-radius:50%; flex-shrink:0;
    border:none; cursor:pointer;
    background:linear-gradient(135deg, var(--cyan), var(--purple));
    display:flex; align-items:center; justify-content:center;
    transition:transform 0.15s ease, opacity 0.15s ease;
  }
  #send:active{ transform:scale(0.92); }
  #send:disabled{ opacity:0.4; cursor:default; }
  #send svg{ width:18px; height:18px; }

  #messages::-webkit-scrollbar{ width:4px; }
  #messages::-webkit-scrollbar-thumb{ background:rgba(124,58,237,0.3); border-radius:4px; }
</style>
</head>
<body>

<header>
  <div class="orb" id="orb"></div>
  <div class="brand">
    <span class="name">MT Studio AI</span>
    <span class="status"><span class="status-dot"></span>সক্রিয়</span>
  </div>
</header>

<div id="messages">
  <div class="empty-state" id="emptyState">
    <div class="big-orb"></div>
    <p>মাহসিন ভাই, আজ কী নিয়ে কাজ করব?</p>
    <span class="hint">strategy, content, prompt — যেকোনো কিছু লিখুন</span>
  </div>
</div>

<div class="input-bar">
  <textarea id="input" rows="1" placeholder="মেসেজ লিখুন..."></textarea>
  <button id="send" aria-label="পাঠান">
    <svg viewBox="0 0 24 24" fill="none" stroke="#0a0e1a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="19" x2="12" y2="5"></line>
      <polyline points="6 11 12 5 18 11"></polyline>
    </svg>
  </button>
</div>

<script>
  // ====== কনফিগ — নিজের মান বসান ======
  const WORKER_URL = "https://hidden-sky-3109.studiomt46.workers.dev/"; // আপনার Worker URL
  const MT_KEY = "amarsopnomtstudioamakebissoporicidibe8019"; // Worker-এ যে MT_SECRET_KEY সেট করেছেন, সেটা এখানে বসান
  const CONVERSATION_ID = "mahsin-main";
  // =====================================

  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('emptyState');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const orb = document.getElementById('orb');

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  sendBtn.addEventListener('click', send);

  function timeNow(){
    return new Date().toLocaleTimeString('bn-BD', { hour:'2-digit', minute:'2-digit' });
  }

  function addMessage(role, text){
    if (emptyState) emptyState.remove();
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = timeNow();
    wrap.appendChild(bubble);
    wrap.appendChild(time);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function showTyping(){
    const wrap = document.createElement('div');
    wrap.className = 'msg ai';
    wrap.id = 'typingIndicator';
    wrap.innerHTML = '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function hideTyping(){
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function send(){
    const text = inputEl.value.trim();
    if (!text) return;

    addMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    orb.classList.add('thinking');
    showTyping();

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-MT-Key': MT_KEY,
        },
        body: JSON.stringify({
          message: text,
          conversationId: CONVERSATION_ID,
          taskType: 'auto',
        }),
      });
      const data = await res.json();
      hideTyping();

      if (!res.ok) {
        addMessage('ai', 'সমস্যা হয়েছে: ' + (data.error || 'অজানা ত্রুটি'));
      } else {
        addMessage('ai', data.reply || '...');
      }
    } catch (err) {
      hideTyping();
      addMessage('ai', 'সংযোগে সমস্যা হয়েছে। নেটওয়ার্ক চেক করুন।');
    } finally {
      sendBtn.disabled = false;
      orb.classList.remove('thinking');
      inputEl.focus();
    }
  }
</script>

</body>
</html>
